<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>소설 비교 에디터</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    :root {
      color-scheme: light;
      --bg: #fafafa;
      --surface: #ffffff;
      --surface-2: #eef1f5;
      --text: #171a1f;
      --muted: #626b78;
      --line: #d8dde6;
      --accent: #2563eb;
      --accent-2: #1d4ed8;
      --danger: #dc2626;
      --saved: #10b981;
      --saving: #f59e0b;
      --shadow: 0 14px 38px rgba(15, 23, 42, 0.14);
      --topbar-h: 52px;
      --tabs-h: 44px;
      --final-h: 32vh;
      --editor-h: calc(100vh - var(--topbar-h) - var(--tabs-h) - var(--final-h) - 10px);
      font-family: -apple-system, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
    }

    :root.dark {
      color-scheme: dark;
      --bg: #111418;
      --surface: #181c22;
      --surface-2: #222832;
      --text: #edf1f7;
      --muted: #a5adba;
      --line: #303845;
      --accent: #60a5fa;
      --accent-2: #93c5fd;
      --danger: #f87171;
      --shadow: 0 18px 44px rgba(0, 0, 0, 0.36);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-width: 960px;
      height: 100vh;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
    }

    button, select, textarea, input {
      font: inherit;
    }

    button, select, input {
      color: var(--text);
    }

    .app {
      height: 100vh;
      display: grid;
      grid-template-rows: var(--topbar-h) var(--tabs-h) 1fr;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 18px;
      background: var(--surface);
      border-bottom: 1px solid #e0e0e0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .brand-mark {
      display: grid;
      place-items: center;
      width: 28px;
      height: 28px;
      border-radius: 7px;
      background: var(--text);
      color: var(--surface);
      font-weight: 800;
      font-size: 14px;
    }

    h1 {
      margin: 0;
      font-size: 16px;
      font-weight: 740;
      letter-spacing: 0;
      white-space: nowrap;
    }

    .actions {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .status {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      min-width: 78px;
      color: var(--muted);
      font-size: 11px;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: var(--saved);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--saved) 18%, transparent);
    }

    .status.saving .dot {
      background: var(--saving);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--saving) 20%, transparent);
    }

    .status.error .dot {
      background: var(--danger);
      box-shadow: 0 0 0 3px color-mix(in srgb, var(--danger) 18%, transparent);
    }

    .btn {
      border: 1px solid var(--line);
      background: var(--surface);
      color: var(--text);
      border-radius: 7px;
      height: 34px;
      padding: 0 12px;
      cursor: pointer;
      white-space: nowrap;
    }

    .btn:hover {
      border-color: var(--accent);
    }

    .btn.primary {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    .btn.icon {
      width: 34px;
      padding: 0;
      display: grid;
      place-items: center;
      font-size: 16px;
    }

    .btn.clear-btn {
      height: 28px;
      padding: 0 10px;
      font-size: 12px;
      background: rgba(255, 255, 255, 0.72);
    }

    .tabs {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 18px;
      background: #fafafa;
      border-bottom: 1px solid #e0e0e0;
    }

    .tab {
      height: 32px;
      padding: 0 16px;
      border: 1px solid #cfd4dc;
      background: transparent;
      color: #5f6368;
      border-radius: 7px;
      cursor: pointer;
    }

    .tab.active {
      background: #202124;
      border-color: #202124;
      color: #fff;
      font-weight: 700;
    }

    .workspace {
      min-height: 0;
      display: grid;
      grid-template-rows: var(--editor-h) 10px var(--final-h);
    }

    .tab-panel {
      min-height: 0;
      display: none;
    }

    .tab-panel.active {
      display: block;
    }

    .compare-pane {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(220px, 1fr) 8px minmax(220px, 1fr) 8px minmax(220px, 1fr);
      min-width: 0;
      background: #fafafa;
    }

    .source-panel {
      min-width: 0;
      display: grid;
      grid-template-rows: 46px 1fr 44px;
      background: var(--surface);
      border-right: 1px solid #e0e0e0;
    }

    .source-panel:last-child {
      border-right: 0;
    }

    .panel-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
      padding: 0 14px;
      padding: 6px 12px;
      border-bottom: 1px solid #e0e0e0;
      min-height: 34px;
    }

    .panel-title {
      font-size: 14px;
      font-weight: 780;
    }

    .source-panel.gpt {
      border-top: 3px solid #9aa0a6;
    }

    .source-panel.gemini {
      border-top: 3px solid #1a73e8;
    }

    .source-panel.claude {
      border-top: 3px solid #e37400;
    }

    .source-panel.gpt .panel-head {
      background: #f1f3f4;
      color: #5f6368;
    }

    .source-panel.gemini .panel-head {
      background: #e8f0fe;
      color: #1a73e8;
    }

    .source-panel.claude .panel-head {
      background: #fef3e2;
      color: #e37400;
    }

    .panel-body {
      min-height: 0;
      overflow: auto;
    }

    .text-area {
      width: 100%;
      min-height: 100%;
      resize: none;
      border: 0;
      outline: 0;
      padding: 16px;
      background: transparent;
      color: var(--text);
      line-height: 1.72;
      font-size: 16px;
      word-break: keep-all;
      overflow-wrap: break-word;
      white-space: pre-wrap;
    }

    .text-area::selection {
      background: color-mix(in srgb, var(--accent) 28%, transparent);
    }

    .source-text {
      background: #fff;
    }

    .text-area::placeholder {
      color: #bbb;
    }

    .panel-foot {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 6px 10px;
      border-top: 1px solid #e0e0e0;
      background: var(--surface);
    }

    .v-resizer {
      cursor: col-resize;
      background:
        linear-gradient(90deg, transparent 0 3px, #e0e0e0 3px 5px, transparent 5px 8px);
    }

    .v-resizer:hover, .v-resizer.dragging {
      background:
        linear-gradient(90deg, transparent 0 2px, var(--accent) 2px 6px, transparent 6px 8px);
    }

    .h-resizer {
      cursor: row-resize;
      display: grid;
      place-items: center;
      background: var(--bg);
      border-top: 1px solid #e0e0e0;
      border-bottom: 1px solid #e0e0e0;
    }

    .h-resizer::before {
      content: "";
      width: 56px;
      height: 4px;
      border-radius: 999px;
      background: var(--line);
    }

    .h-resizer:hover::before, .h-resizer.dragging::before {
      background: var(--accent);
    }

    .draft-pane {
      height: 100%;
      background: var(--surface);
    }

    .draft-pane .text-area {
      height: 100%;
      padding: 20px;
    }

    .card-board-pane {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: 50px 1fr;
      background: #f8f9fa;
    }

    .card-board-pane.idea-board {
      background: #fff8e1;
    }

    .card-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px solid #e0e0e0;
      background: inherit;
    }

    .card-search {
      width: min(360px, 100%);
      height: 34px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      padding: 0 11px;
      outline: 0;
    }

    .card-search:focus {
      border-color: var(--accent);
    }

    .card-grid {
      min-height: 0;
      overflow: auto;
      display: grid;
      grid-template-columns: repeat(auto-fill, 280px);
      align-content: start;
      gap: 12px;
      padding: 16px;
    }

    .note-card {
      position: relative;
      width: 280px;
      min-height: 116px;
      border: 1px solid #e0e0e0;
      border-radius: 8px;
      background: #fff;
      padding: 14px 38px 28px 14px;
      box-shadow: 0 4px 16px rgba(15, 23, 42, 0.06);
      cursor: text;
    }

    .idea-board .note-card {
      background: #fffde7;
    }

    .note-card.pinned {
      background: #eef6ff;
      border-color: #a8c7fa;
    }

    .idea-board .note-card.pinned {
      background: #fff4bf;
      border-color: #f4d35e;
    }

    .card-actions {
      position: absolute;
      top: 8px;
      right: 8px;
      display: flex;
      gap: 4px;
    }

    .card-action {
      width: 24px;
      height: 24px;
      border: 0;
      border-radius: 6px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
      padding: 0;
    }

    .card-action:hover {
      background: rgba(0, 0, 0, 0.07);
      color: var(--text);
    }

    .card-text {
      min-height: 54px;
      color: var(--text);
      line-height: 1.6;
      font-size: 14px;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }

    .card-title-line {
      font-weight: 500;
    }

    .card-editor {
      width: 100%;
      min-height: 118px;
      resize: vertical;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      color: var(--text);
      padding: 8px;
      outline: 0;
      line-height: 1.6;
      font-size: 14px;
    }

    .card-created {
      position: absolute;
      right: 12px;
      bottom: 8px;
      color: var(--muted);
      font-size: 11px;
    }

    .empty-board {
      grid-column: 1 / -1;
      color: var(--muted);
      padding: 18px 4px;
      font-size: 13px;
    }

    .workspace.focus-mode,
    .workspace.summary-mode,
    .workspace.board-mode {
      grid-template-rows: 1fr;
    }

    .workspace.focus-mode .final-pane,
    .workspace.focus-mode .h-resizer,
    .workspace.summary-mode .final-pane,
    .workspace.summary-mode .h-resizer,
    .workspace.board-mode .final-pane,
    .workspace.board-mode .h-resizer {
      display: none;
    }

    .focus-pane {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-columns: minmax(260px, 1fr) 8px minmax(260px, 1fr);
      background: #fafafa;
    }

    .focus-source,
    .focus-final {
      min-width: 0;
      min-height: 0;
      display: grid;
      grid-template-rows: 46px 1fr;
      background: var(--surface);
    }

    .focus-source {
      border-top: 3px solid #9aa0a6;
    }

    .focus-source[data-model="gpt"] { border-top-color: #9aa0a6; }
    .focus-source[data-model="gem"] { border-top-color: #1a73e8; }
    .focus-source[data-model="cla"] { border-top-color: #e37400; }

    .model-tabs {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-bottom: 1px solid #e0e0e0;
      background: var(--surface);
    }

    .model-tab {
      height: 30px;
      padding: 0 12px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      font-weight: 700;
    }

    .model-tab.active { color: #fff; }
    .model-tab[data-model="gpt"].active { background: #9aa0a6; border-color: #9aa0a6; }
    .model-tab[data-model="gem"].active { background: #1a73e8; border-color: #1a73e8; }
    .model-tab[data-model="cla"].active { background: #e37400; border-color: #e37400; }

    .focus-final .final-head {
      width: 100%;
      min-width: 0;
      padding: 0 14px;
      margin: 0;
    }

    .focus-final .final-editor {
      justify-content: stretch;
    }

    #focusFinalText,
    #focusSourceText {
      width: 100%;
      min-width: 0;
      height: 100%;
      padding: 16px;
    }

    .summary-pane {
      height: 100%;
      min-height: 0;
      display: grid;
      grid-template-rows: 46px 1fr;
      background: var(--surface);
    }

    .summary-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 14px;
      padding: 0 14px;
      border-bottom: 1px solid #e0e0e0;
    }

    .summary-stats {
      display: flex;
      align-items: center;
      gap: 8px;
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
    }

    .summary-editor {
      min-height: 0;
      overflow: auto;
    }

    #summaryText {
      height: 100%;
      padding: 20px;
    }

    .final-pane {
      min-height: 180px;
      display: grid;
      grid-template-rows: 46px 1fr;
      background: var(--surface);
      border-top: 2px solid #e0e0e0;
    }

    .final-pane.final-overlay {
      position: fixed;
      top: 0;
      right: 0;
      z-index: 60;
      width: 45%;
      height: 100vh;
      min-height: 100vh;
      background: #fff;
      border-top: 0;
      border-left: 2px solid #e0e0e0;
      box-shadow: -18px 0 36px rgba(0, 0, 0, 0.12);
      transform: translateX(100%);
      transition: transform 0.2s ease;
    }

    .final-pane.final-overlay.is-expanded {
      transform: translateX(0);
    }

    .final-pane.final-overlay .final-head,
    .final-pane.final-overlay #finalText {
      width: calc(100% - 48px);
      min-width: 0;
    }

    .final-pane.final-overlay #finalText {
      padding: 22px 0;
    }

    .final-head {
      display: flex;
      align-items: center;
      gap: 10px;
      width: min(60%, 920px);
      min-width: 520px;
      margin: 0 auto;
      padding: 0;
      border-bottom: 1px solid #e0e0e0;
    }

    .final-tools {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .counter {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: #999;
      font-size: 12px;
    }

    #countValue::after {
      content: "자";
    }

    .select {
      height: 32px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: var(--surface);
      padding: 0 8px;
    }

    .final-editor {
      min-height: 0;
      overflow: auto;
      display: flex;
      justify-content: center;
    }

    #finalText {
      height: 100%;
      width: min(60%, 920px);
      min-width: 520px;
      padding: 22px 0;
    }

    .source-panel.gpt .add-all {
      color: #5f6368;
    }

    .source-panel.gemini .add-all {
      color: #1a73e8;
    }

    .source-panel.claude .add-all {
      color: #e37400;
    }

    .floating-add {
      position: fixed;
      z-index: 20;
      display: none;
      height: 36px;
      padding: 0 12px;
      border: 0;
      border-radius: 7px;
      background: var(--accent);
      color: #fff;
      box-shadow: var(--shadow);
      cursor: pointer;
      font-weight: 700;
    }

    .floating-add.show {
      display: block;
    }

    .toast {
      position: fixed;
      right: 16px;
      bottom: 16px;
      z-index: 30;
      display: none;
      max-width: 360px;
      padding: 11px 13px;
      border-radius: 7px;
      background: var(--text);
      color: var(--surface);
      box-shadow: var(--shadow);
      font-size: 13px;
    }

    .toast.show {
      display: block;
    }

    .config-overlay {
      position: fixed;
      inset: 0;
      z-index: 40;
      display: none;
      align-items: center;
      justify-content: center;
      padding: 24px;
      background: rgba(0, 0, 0, 0.45);
    }

    .config-overlay.show {
      display: flex;
    }

    .config-box {
      width: min(520px, 100%);
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--surface);
      padding: 22px;
      box-shadow: var(--shadow);
    }

    .config-box h2 {
      margin: 0 0 10px;
      font-size: 18px;
    }

    .config-box p {
      margin: 0;
      color: var(--muted);
      line-height: 1.65;
    }

    @media (max-width: 980px) {
      body {
        min-width: 0;
      }

      .topbar {
        padding: 0 10px;
      }

      h1 {
        font-size: 14px;
      }

      .actions {
        gap: 6px;
      }

      .btn {
        padding: 0 9px;
      }

      .compare-pane {
        overflow-x: auto;
      }

      .tabs {
        gap: 6px;
        overflow-x: auto;
      }

      .tab {
        padding: 0 12px;
      }

      .source-panel {
        min-width: 280px;
      }

      .final-head,
      #finalText {
        width: calc(100% - 32px);
        min-width: 0;
      }

      .final-pane.final-overlay {
        width: 88%;
      }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <div class="brand-mark">N</div>
        <h1>소설 비교 에디터</h1>
      </div>
      <div class="actions">
        <div id="saveStatus" class="status" title="저장 상태">
          <span class="dot"></span>
          <span id="saveStatusText">준비중</span>
        </div>
        <button id="shareBtn" class="btn" type="button">공유 URL 복사</button>
        <button id="themeBtn" class="btn icon" type="button" title="다크모드 전환" aria-label="다크모드 전환">◐</button>
      </div>
    </header>

    <nav class="tabs" aria-label="작업 탭">
      <button class="tab active" type="button" data-tab="compare">비교</button>
      <button class="tab" type="button" data-tab="focus">집중</button>
      <button class="tab" type="button" data-tab="summary">정리</button>
      <button class="tab" type="button" data-tab="memo">메모</button>
      <button class="tab" type="button" data-tab="idea">아이디어</button>
      <button class="tab" type="button" data-tab="draft">초안 입력</button>
    </nav>

    <main class="workspace" id="workspace">
      <section id="compareTab" class="tab-panel active" aria-label="비교 패널">
        <div id="comparePane" class="compare-pane">
          <article class="source-panel gpt">
            <div class="panel-head">
              <div class="panel-title">GPT</div>
              <button class="btn clear-btn clear-text" type="button" data-clear-target="gptText">비우기</button>
            </div>
            <div class="panel-body">
              <textarea id="gptText" class="text-area source-text" spellcheck="false" placeholder="GPT 결과를 붙여넣으세요."></textarea>
            </div>
            <div class="panel-foot">
              <button class="btn add-all" type="button" data-source="gptText">전체 텍스트 → 최종본</button>
            </div>
          </article>
          <div class="v-resizer" data-left="0" data-right="2" aria-hidden="true"></div>
          <article class="source-panel gemini">
            <div class="panel-head">
              <div class="panel-title">Gemini</div>
              <button class="btn clear-btn clear-text" type="button" data-clear-target="gemText">비우기</button>
            </div>
            <div class="panel-body">
              <textarea id="gemText" class="text-area source-text" spellcheck="false" placeholder="Gemini 결과를 붙여넣으세요."></textarea>
            </div>
            <div class="panel-foot">
              <button class="btn add-all" type="button" data-source="gemText">전체 텍스트 → 최종본</button>
            </div>
          </article>
          <div class="v-resizer" data-left="2" data-right="4" aria-hidden="true"></div>
          <article class="source-panel claude">
            <div class="panel-head">
              <div class="panel-title">Claude</div>
              <button class="btn clear-btn clear-text" type="button" data-clear-target="claText">비우기</button>
            </div>
            <div class="panel-body">
              <textarea id="claText" class="text-area source-text" spellcheck="false" placeholder="Claude 결과를 붙여넣으세요."></textarea>
            </div>
            <div class="panel-foot">
              <button class="btn add-all" type="button" data-source="claText">전체 텍스트 → 최종본</button>
            </div>
          </article>
        </div>
      </section>

      <section id="focusTab" class="tab-panel" aria-label="집중">
        <div id="focusPane" class="focus-pane">
          <article id="focusSourcePanel" class="focus-source" data-model="gpt">
            <div class="model-tabs" aria-label="모델 선택">
              <button class="model-tab active" type="button" data-model="gpt" data-source="gptText">GPT</button>
              <button class="model-tab" type="button" data-model="gem" data-source="gemText">Gemini</button>
              <button class="model-tab" type="button" data-model="cla" data-source="claText">Claude</button>
            </div>
            <div class="panel-body">
              <textarea id="focusSourceText" class="text-area source-text" spellcheck="false" placeholder="GPT 결과를 표시합니다."></textarea>
            </div>
          </article>
          <div id="focusResizer" class="v-resizer" aria-hidden="true"></div>
          <article class="focus-final" aria-label="집중 최종본">
            <div class="final-head">
              <div class="panel-title">최종본</div>
              <div class="final-tools">
                <span id="focusCountValue" class="counter">0</span>
                <select id="focusCountMode" class="select" aria-label="자수 계산 방식">
                  <option value="chars">자수</option>
                  <option value="charsNoSpace">공백제외</option>
                  <option value="words">단어수</option>
                </select>
              </div>
            </div>
            <div class="final-editor">
              <textarea id="focusFinalText" class="text-area" spellcheck="false" placeholder="선택한 문장이나 전체 텍스트를 모아 최종본을 편집하세요."></textarea>
            </div>
          </article>
        </div>
      </section>

      <section id="summaryTab" class="tab-panel" aria-label="정리">
        <div class="summary-pane">
          <div class="summary-head">
            <div class="summary-stats">
              <span>전체 자수: <strong id="summaryChars">0자</strong></span>
              <span>|</span>
              <span>공백 제외: <strong id="summaryCharsNoSpace">0자</strong></span>
              <span>|</span>
              <span>단어 수: <strong id="summaryWords">0</strong></span>
            </div>
            <button id="copySummaryBtn" class="btn" type="button">전체 복사</button>
          </div>
          <div class="summary-editor">
            <textarea id="summaryText" class="text-area" spellcheck="false" placeholder="한 화 전체 정리를 입력하세요."></textarea>
          </div>
        </div>
      </section>

      <section id="memoTab" class="tab-panel" aria-label="메모">
        <div class="card-board-pane memo-board" data-board="memo">
          <div class="card-toolbar">
            <button id="addMemoCard" class="btn primary" type="button">+ 새 카드</button>
            <input id="memoSearch" class="card-search" type="search" placeholder="메모 검색" autocomplete="off">
          </div>
          <div id="memoGrid" class="card-grid" aria-label="메모 카드"></div>
        </div>
      </section>

      <section id="ideaTab" class="tab-panel" aria-label="아이디어">
        <div class="card-board-pane idea-board" data-board="idea">
          <div class="card-toolbar">
            <button id="addIdeaCard" class="btn primary" type="button">+ 새 카드</button>
            <input id="ideaSearch" class="card-search" type="search" placeholder="아이디어 검색" autocomplete="off">
          </div>
          <div id="ideaGrid" class="card-grid" aria-label="아이디어 카드"></div>
        </div>
      </section>

      <section id="draftTab" class="tab-panel" aria-label="초안 입력">
        <div class="draft-pane">
          <textarea id="draftText" class="text-area" spellcheck="false" placeholder="초안을 입력하세요."></textarea>
        </div>
      </section>

      <div id="heightResizer" class="h-resizer" aria-hidden="true"></div>

      <section class="final-pane" aria-label="최종본 에디터">
        <div class="final-head">
          <div class="panel-title">최종본</div>
          <div class="final-tools">
            <span id="countValue" class="counter">0</span>
            <select id="countMode" class="select" aria-label="자수 계산 방식">
              <option value="chars">자수</option>
              <option value="charsNoSpace">공백제외</option>
              <option value="words">단어수</option>
            </select>
            <button id="finalExpandBtn" class="btn icon" type="button" title="최종본 확대" aria-label="최종본 확대">⛶</button>
          </div>
        </div>
        <div class="final-editor">
          <textarea id="finalText" class="text-area" spellcheck="false" placeholder="선택한 문장이나 전체 텍스트를 모아 최종본을 편집하세요."></textarea>
        </div>
      </section>
    </main>
  </div>

  <button id="floatingAdd" class="floating-add" type="button">↓ 최종본에 추가</button>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

  <div id="configOverlay" class="config-overlay">
    <div class="config-box">
      <h2>Supabase 환경변수가 필요합니다</h2>
      <p>Vercel 프로젝트 환경변수에 <strong>SUPABASE_URL</strong>과 <strong>SUPABASE_ANON_KEY</strong>를 등록한 뒤 다시 열어주세요. 로컬에서는 같은 이름의 환경변수로 Vercel 개발 서버를 실행하면 됩니다.</p>
    </div>
  </div>

  <script>
    const DB_FIELDS = ["gpt_text", "gem_text", "cla_text", "final_text", "draft_text", "summary_text"];
    const CARD_FIELDS = {
      memo: "memo_cards",
      idea: "idea_cards"
    };
    const DOM_TO_DB = {
      gptText: "gpt_text",
      gemText: "gem_text",
      claText: "cla_text",
      finalText: "final_text",
      draftText: "draft_text",
      summaryText: "summary_text"
    };
    const DB_TO_DOM = Object.fromEntries(Object.entries(DOM_TO_DB).map(([dom, db]) => [db, dom]));
    const SAVE_DELAY = 700;
    const MIN_PANEL = 220;
    const SESSION_STORAGE_KEY = "novel_editor_session_key";
    const THEME_STORAGE_KEY = "novel_editor_theme";

    const els = {
      workspace: document.getElementById("workspace"),
      comparePane: document.getElementById("comparePane"),
      focusPane: document.getElementById("focusPane"),
      focusResizer: document.getElementById("focusResizer"),
      focusSourcePanel: document.getElementById("focusSourcePanel"),
      focusSourceText: document.getElementById("focusSourceText"),
      focusFinalText: document.getElementById("focusFinalText"),
      heightResizer: document.getElementById("heightResizer"),
      saveStatus: document.getElementById("saveStatus"),
      saveStatusText: document.getElementById("saveStatusText"),
      shareBtn: document.getElementById("shareBtn"),
      themeBtn: document.getElementById("themeBtn"),
      finalPane: document.querySelector(".final-pane"),
      finalExpandBtn: document.getElementById("finalExpandBtn"),
      countMode: document.getElementById("countMode"),
      countValue: document.getElementById("countValue"),
      focusCountMode: document.getElementById("focusCountMode"),
      focusCountValue: document.getElementById("focusCountValue"),
      summaryChars: document.getElementById("summaryChars"),
      summaryCharsNoSpace: document.getElementById("summaryCharsNoSpace"),
      summaryWords: document.getElementById("summaryWords"),
      copySummaryBtn: document.getElementById("copySummaryBtn"),
      addMemoCard: document.getElementById("addMemoCard"),
      addIdeaCard: document.getElementById("addIdeaCard"),
      memoSearch: document.getElementById("memoSearch"),
      ideaSearch: document.getElementById("ideaSearch"),
      memoGrid: document.getElementById("memoGrid"),
      ideaGrid: document.getElementById("ideaGrid"),
      floatingAdd: document.getElementById("floatingAdd"),
      toast: document.getElementById("toast"),
      configOverlay: document.getElementById("configOverlay")
    };

    const textareas = {
      gptText: document.getElementById("gptText"),
      gemText: document.getElementById("gemText"),
      claText: document.getElementById("claText"),
      finalText: document.getElementById("finalText"),
      draftText: document.getElementById("draftText"),
      summaryText: document.getElementById("summaryText")
    };

    const state = {
      supabase: null,
      sessionKey: "",
      rowId: null,
      saveTimer: null,
      applyingRemote: false,
      selectedText: "",
      activeSelectionEl: null,
      focusModel: "gpt",
      focusSourceId: "gptText",
      finalExpanded: false,
      finalCollapseTimer: null,
      realtimeChannel: null,
      memoCards: [],
      ideaCards: [],
      cardSearch: {
        memo: "",
        idea: ""
      },
      editingCard: null
    };

    init();

    async function init() {
      applyInitialTheme();
      bindUi();
      setStatus("saving", "준비중");
      state.sessionKey = resolveSessionKey();
      syncSessionUrl();

      try {
        const config = await loadEnv();
        if (!config.SUPABASE_URL || !config.SUPABASE_ANON_KEY) {
          showConfigOverlay();
          setStatus("error", "설정 필요");
          return;
        }

        state.supabase = window.supabase.createClient(config.SUPABASE_URL, config.SUPABASE_ANON_KEY);
        await loadOrCreateSession();
        subscribeRealtime();
        setStatus("saved", "저장됨");
      } catch (error) {
        console.error(error);
        setStatus("error", "오류");
        showToast("Supabase 연결을 확인해주세요.");
      }
    }

    async function loadEnv() {
      const response = await fetch("/api/env", { cache: "no-store" });
      if (!response.ok) {
        throw new Error("Failed to load environment config");
      }
      return response.json();
    }

    function resolveSessionKey() {
      const params = new URLSearchParams(window.location.search);
      const keyFromUrl = params.get("s");
      if (keyFromUrl) {
        localStorage.setItem(SESSION_STORAGE_KEY, keyFromUrl);
        return keyFromUrl;
      }

      const existing = localStorage.getItem(SESSION_STORAGE_KEY);
      if (existing) return existing;

      const created = crypto.randomUUID();
      localStorage.setItem(SESSION_STORAGE_KEY, created);
      return created;
    }

    function syncSessionUrl() {
      if (!state.sessionKey || !window.history?.replaceState) return;

      const url = new URL(window.location.href);
      const sessionSearch = `?s=${encodeURIComponent(state.sessionKey)}`;
      if (url.search === sessionSearch) return;

      url.search = sessionSearch;
      window.history.replaceState(null, "", url.toString());
    }

    async function loadOrCreateSession() {
      const { data, error } = await state.supabase
        .from("sessions")
        .select("*")
        .eq("session_key", state.sessionKey)
        .maybeSingle();

      if (error) throw error;

      if (data) {
        state.rowId = data.id;
        applyRow(data);
        return;
      }

      const blank = {
        session_key: state.sessionKey,
        gpt_text: "",
        gem_text: "",
        cla_text: "",
        final_text: "",
        draft_text: "",
        summary_text: "",
        memo_cards: [],
        idea_cards: [],
        updated_at: new Date().toISOString()
      };

      const { data: inserted, error: insertError } = await state.supabase
        .from("sessions")
        .insert(blank)
        .select("*")
        .single();

      if (insertError) throw insertError;
      state.rowId = inserted.id;
      applyRow(inserted);
    }

    function subscribeRealtime() {
      state.realtimeChannel = state.supabase
        .channel(`session:${state.sessionKey}`)
        .on(
          "postgres_changes",
          {
            event: "UPDATE",
            schema: "public",
            table: "sessions",
            filter: `session_key=eq.${state.sessionKey}`
          },
          payload => {
            if (!payload.new) return;
            state.rowId = payload.new.id;
            applyRow(payload.new, true);
            setStatus("saved", "동기화됨");
          }
        )
        .subscribe();
    }

    function applyRow(row, remote = false) {
      state.applyingRemote = true;
      DB_FIELDS.forEach(field => {
        const domId = DB_TO_DOM[field];
        const el = textareas[domId];
        if (document.activeElement !== el || remote) {
          el.value = row[field] || "";
        }
      });
      updateCount();
      syncFocusSource();
      syncFocusFinalFromMain();
      updateSummaryCount();
      state.memoCards = normalizeCards(row.memo_cards);
      state.ideaCards = normalizeCards(row.idea_cards);
      renderBoard("memo");
      renderBoard("idea");
      state.applyingRemote = false;
    }

    function bindUi() {
      Object.values(textareas).forEach(el => {
        el.addEventListener("input", () => {
          if (el === textareas[state.focusSourceId]) {
            syncFocusSource();
          }
          if (el === textareas.finalText) {
            syncFocusFinalFromMain();
          }
          updateCount();
          updateSummaryCount();
          scheduleSave();
        });
      });

      document.querySelectorAll(".tab").forEach(tab => {
        tab.addEventListener("click", () => switchTab(tab.dataset.tab));
      });

      document.querySelectorAll(".add-all").forEach(button => {
        button.addEventListener("click", () => appendToFinal(textareas[button.dataset.source].value));
      });

      document.querySelectorAll(".clear-text").forEach(button => {
        button.addEventListener("click", () => clearTextArea(button.dataset.clearTarget));
      });

      document.querySelectorAll(".source-text").forEach(el => {
        el.addEventListener("mouseup", () => updateFloatingAdd(el));
        el.addEventListener("keyup", () => updateFloatingAdd(el));
        el.addEventListener("scroll", hideFloatingAdd);
      });

      document.querySelectorAll(".model-tab").forEach(button => {
        button.addEventListener("click", () => switchFocusModel(button));
      });

      els.focusSourceText.addEventListener("input", () => {
        textareas[state.focusSourceId].value = els.focusSourceText.value;
        scheduleSave();
      });

      els.focusFinalText.addEventListener("input", () => {
        textareas.finalText.value = els.focusFinalText.value;
        updateCount();
        scheduleSave();
      });

      document.addEventListener("mousedown", event => {
        if (event.target !== els.floatingAdd && !event.target.classList.contains("source-text")) {
          hideFloatingAdd();
        }

        if (state.finalExpanded && !els.finalPane.contains(event.target)) {
          collapseFinalEditor();
        }

        if (state.editingCard) {
          const activeCard = document.querySelector(`.note-card[data-card-id="${state.editingCard.id}"]`);
          if (activeCard && !activeCard.contains(event.target)) {
            finishEditingCard();
          }
        }
      });

      els.floatingAdd.addEventListener("mousedown", event => event.preventDefault());
      els.floatingAdd.addEventListener("click", () => {
        appendToFinal(state.selectedText);
        hideFloatingAdd();
      });

      els.countMode.addEventListener("change", updateCount);
      els.focusCountMode.addEventListener("change", () => {
        els.countMode.value = els.focusCountMode.value;
        updateCount();
      });
      els.copySummaryBtn.addEventListener("click", copySummaryText);
      els.addMemoCard.addEventListener("click", () => addCard("memo"));
      els.addIdeaCard.addEventListener("click", () => addCard("idea"));
      els.memoSearch.addEventListener("input", event => {
        state.cardSearch.memo = event.target.value;
        renderBoard("memo");
      });
      els.ideaSearch.addEventListener("input", event => {
        state.cardSearch.idea = event.target.value;
        renderBoard("idea");
      });
      els.memoGrid.addEventListener("click", event => handleBoardClick(event, "memo"));
      els.ideaGrid.addEventListener("click", event => handleBoardClick(event, "idea"));
      els.shareBtn.addEventListener("click", copyShareUrl);
      els.themeBtn.addEventListener("click", toggleTheme);
      els.finalExpandBtn.addEventListener("click", event => {
        event.stopPropagation();
        toggleFinalEditor();
      });

      document.querySelectorAll(".v-resizer[data-left]").forEach(resizer => {
        resizer.addEventListener("pointerdown", startVerticalResize);
      });

      els.focusResizer.addEventListener("pointerdown", startFocusResize);
      els.heightResizer.addEventListener("pointerdown", startHeightResize);
    }

    function switchTab(name) {
      document.querySelectorAll(".tab").forEach(tab => {
        tab.classList.toggle("active", tab.dataset.tab === name);
      });
      document.querySelectorAll(".tab-panel").forEach(panel => {
        panel.classList.toggle("active", panel.id === `${name}Tab`);
      });
      els.workspace.classList.toggle("focus-mode", name === "focus");
      els.workspace.classList.toggle("summary-mode", name === "summary");
      els.workspace.classList.toggle("board-mode", name === "memo" || name === "idea");
      if (name === "focus") {
        syncFocusSource();
        syncFocusFinalFromMain();
      }
      hideFloatingAdd();
    }

    function clearTextArea(domId) {
      const el = textareas[domId];
      if (!el) return;
      el.value = "";
      if (domId === state.focusSourceId) {
        syncFocusSource();
      }
      updateCount();
      updateSummaryCount();
      hideFloatingAdd();
      scheduleSave();
      showToast("비웠습니다.");
    }

    function getCards(board) {
      return board === "memo" ? state.memoCards : state.ideaCards;
    }

    function setCards(board, cards) {
      if (board === "memo") {
        state.memoCards = cards;
      } else {
        state.ideaCards = cards;
      }
    }

    function getBoardGrid(board) {
      return board === "memo" ? els.memoGrid : els.ideaGrid;
    }

    function normalizeCards(value) {
      const cards = Array.isArray(value) ? value : [];
      return cards
        .filter(card => card && typeof card === "object")
        .map(card => ({
          id: card.id || crypto.randomUUID(),
          text: typeof card.text === "string" ? card.text : "",
          pinned: Boolean(card.pinned),
          created_at: card.created_at || new Date().toISOString()
        }));
    }

    function getVisibleCards(board) {
      const cards = getCards(board);
      const query = state.cardSearch[board].trim().toLocaleLowerCase("ko-KR");
      if (query) {
        return cards.filter(card => card.text.toLocaleLowerCase("ko-KR").includes(query));
      }
      return [...cards].sort((a, b) => Number(b.pinned) - Number(a.pinned));
    }

    function renderBoard(board) {
      const grid = getBoardGrid(board);
      const cards = getVisibleCards(board);
      grid.innerHTML = "";

      if (!cards.length) {
        const empty = document.createElement("div");
        empty.className = "empty-board";
        empty.textContent = state.cardSearch[board].trim() ? "검색 결과가 없습니다." : "+ 새 카드로 시작하세요.";
        grid.appendChild(empty);
        return;
      }

      cards.forEach(card => {
        const article = document.createElement("article");
        article.className = `note-card${card.pinned ? " pinned" : ""}`;
        article.dataset.cardId = card.id;

        const actions = document.createElement("div");
        actions.className = "card-actions";
        actions.innerHTML = `
          <button class="card-action pin-card" type="button" title="핀 고정" aria-label="핀 고정">📌</button>
          <button class="card-action delete-card" type="button" title="삭제" aria-label="삭제">✕</button>
        `;
        article.appendChild(actions);

        if (state.editingCard?.board === board && state.editingCard.id === card.id) {
          const editor = document.createElement("textarea");
          editor.className = "card-editor";
          editor.value = card.text;
          editor.addEventListener("input", () => {
            state.editingCard.textarea = editor;
          });
          editor.addEventListener("keydown", event => {
            if (event.key === "Escape") {
              finishEditingCard();
            }
          });
          article.appendChild(editor);
          requestAnimationFrame(() => {
            editor.focus();
            editor.selectionStart = editor.selectionEnd = editor.value.length;
          });
        } else {
          article.appendChild(renderCardText(card.text));
        }

        const created = document.createElement("time");
        created.className = "card-created";
        created.dateTime = card.created_at;
        created.textContent = formatCardDate(card.created_at);
        article.appendChild(created);
        grid.appendChild(article);
      });
    }

    function renderCardText(text) {
      const content = document.createElement("div");
      content.className = "card-text";
      const lines = text ? text.split("\n") : [""];
      const title = document.createElement("div");
      title.className = "card-title-line";
      title.textContent = lines[0] || "새 카드";
      content.appendChild(title);

      if (lines.length > 1) {
        const rest = document.createElement("div");
        rest.textContent = lines.slice(1).join("\n");
        content.appendChild(rest);
      }

      return content;
    }

    function handleBoardClick(event, board) {
      const cardEl = event.target.closest(".note-card");
      if (!cardEl) return;

      const cardId = cardEl.dataset.cardId;
      if (event.target.closest(".pin-card")) {
        toggleCardPinned(board, cardId);
        return;
      }
      if (event.target.closest(".delete-card")) {
        deleteCard(board, cardId);
        return;
      }
      if (!event.target.closest(".card-editor")) {
        startEditingCard(board, cardId);
      }
    }

    function addCard(board) {
      finishEditingCard();
      const card = {
        id: crypto.randomUUID(),
        text: "",
        pinned: false,
        created_at: new Date().toISOString()
      };
      setCards(board, [card, ...getCards(board)]);
      state.cardSearch[board] = "";
      if (board === "memo") {
        els.memoSearch.value = "";
      } else {
        els.ideaSearch.value = "";
      }
      state.editingCard = { board, id: card.id, textarea: null };
      renderBoard(board);
      scheduleSave();
    }

    function startEditingCard(board, cardId) {
      if (state.editingCard?.board === board && state.editingCard.id === cardId) return;
      finishEditingCard();
      state.editingCard = { board, id: cardId, textarea: null };
      renderBoard(board);
    }

    function finishEditingCard() {
      if (!state.editingCard) return;
      const { board, id } = state.editingCard;
      const textarea = document.querySelector(`.note-card[data-card-id="${id}"] .card-editor`);
      const nextText = textarea ? textarea.value : "";
      const cards = getCards(board).map(card => card.id === id ? { ...card, text: nextText } : card);
      setCards(board, cards);
      state.editingCard = null;
      renderBoard(board);
      scheduleSave();
    }

    function toggleCardPinned(board, cardId) {
      finishEditingCard();
      const cards = getCards(board).map(card => card.id === cardId ? { ...card, pinned: !card.pinned } : card);
      setCards(board, cards);
      renderBoard(board);
      scheduleSave();
    }

    function deleteCard(board, cardId) {
      finishEditingCard();
      setCards(board, getCards(board).filter(card => card.id !== cardId));
      renderBoard(board);
      scheduleSave();
    }

    function formatCardDate(value) {
      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return "";
      const month = date.getMonth() + 1;
      const day = date.getDate();
      const hours = String(date.getHours()).padStart(2, "0");
      const minutes = String(date.getMinutes()).padStart(2, "0");
      return `${month}.${day} ${hours}:${minutes}`;
    }

    function switchFocusModel(button) {
      state.focusModel = button.dataset.model;
      state.focusSourceId = button.dataset.source;
      document.querySelectorAll(".model-tab").forEach(tab => {
        tab.classList.toggle("active", tab === button);
      });
      els.focusSourcePanel.dataset.model = state.focusModel;
      syncFocusSource();
      hideFloatingAdd();
    }

    function syncFocusSource() {
      if (!els.focusSourceText) return;
      const source = textareas[state.focusSourceId];
      if (source && document.activeElement !== els.focusSourceText) {
        els.focusSourceText.value = source.value;
      }
    }

    function syncFocusFinalFromMain() {
      if (!els.focusFinalText || document.activeElement === els.focusFinalText) return;
      els.focusFinalText.value = textareas.finalText.value;
    }

    function updateFloatingAdd(el) {
      const selected = el.value.slice(el.selectionStart, el.selectionEnd).trim();
      if (!selected) {
        hideFloatingAdd();
        return;
      }

      state.selectedText = selected;
      state.activeSelectionEl = el;
      const rect = el.getBoundingClientRect();
      const top = Math.min(Math.max(rect.top + 12, 66), window.innerHeight - 92);
      const left = Math.min(Math.max(rect.left + rect.width - 172, 12), window.innerWidth - 176);
      els.floatingAdd.style.top = `${top}px`;
      els.floatingAdd.style.left = `${left}px`;
      els.floatingAdd.classList.add("show");
    }

    function hideFloatingAdd() {
      els.floatingAdd.classList.remove("show");
    }

    function toggleFinalEditor() {
      if (state.finalExpanded) {
        collapseFinalEditor();
      } else {
        expandFinalEditor();
      }
    }

    function expandFinalEditor() {
      clearTimeout(state.finalCollapseTimer);
      state.finalExpanded = true;
      els.finalPane.classList.add("final-overlay");
      els.finalExpandBtn.textContent = "✕";
      els.finalExpandBtn.title = "최종본 축소";
      els.finalExpandBtn.setAttribute("aria-label", "최종본 축소");
      requestAnimationFrame(() => {
        els.finalPane.classList.add("is-expanded");
      });
    }

    function collapseFinalEditor() {
      if (!state.finalExpanded) return;
      state.finalExpanded = false;
      els.finalPane.classList.remove("is-expanded");
      els.finalExpandBtn.textContent = "⛶";
      els.finalExpandBtn.title = "최종본 확대";
      els.finalExpandBtn.setAttribute("aria-label", "최종본 확대");
      state.finalCollapseTimer = setTimeout(() => {
        if (!state.finalExpanded) {
          els.finalPane.classList.remove("final-overlay");
        }
      }, 200);
    }

    function appendToFinal(text) {
      const value = text.trim();
      if (!value) return;
      const final = textareas.finalText;
      const prefix = final.value.trim().length ? "\n\n" : "";
      final.value += `${prefix}${value}`;
      syncFocusFinalFromMain();
      const activeFinal = els.workspace.classList.contains("focus-mode") ? els.focusFinalText : final;
      activeFinal.focus();
      activeFinal.selectionStart = activeFinal.selectionEnd = activeFinal.value.length;
      updateCount();
      scheduleSave();
    }

    function startVerticalResize(event) {
      const resizer = event.currentTarget;
      const leftIndex = Number(resizer.dataset.left);
      const rightIndex = Number(resizer.dataset.right);
      const startX = event.clientX;
      const columns = getPanelColumns();
      const leftStart = columns[leftIndex];
      const rightStart = columns[rightIndex];

      resizer.setPointerCapture(event.pointerId);
      resizer.classList.add("dragging");

      const onMove = moveEvent => {
        const delta = moveEvent.clientX - startX;
        const left = Math.max(MIN_PANEL, leftStart + delta);
        const right = Math.max(MIN_PANEL, rightStart - delta);
        columns[leftIndex] = left;
        columns[rightIndex] = right;
        setPanelColumns(columns);
      };

      const onUp = () => {
        resizer.classList.remove("dragging");
        resizer.removeEventListener("pointermove", onMove);
        resizer.removeEventListener("pointerup", onUp);
      };

      resizer.addEventListener("pointermove", onMove);
      resizer.addEventListener("pointerup", onUp);
    }

    function getPanelColumns() {
      return getComputedStyle(els.comparePane)
        .gridTemplateColumns
        .split(" ")
        .map(value => Number.parseFloat(value));
    }

    function setPanelColumns(columns) {
      els.comparePane.style.gridTemplateColumns = `${columns[0]}px 8px ${columns[2]}px 8px ${columns[4]}px`;
    }

    function startFocusResize(event) {
      const startX = event.clientX;
      const columns = getComputedStyle(els.focusPane)
        .gridTemplateColumns
        .split(" ")
        .map(value => Number.parseFloat(value));
      const leftStart = columns[0];
      const rightStart = columns[2];

      els.focusResizer.setPointerCapture(event.pointerId);
      els.focusResizer.classList.add("dragging");

      const onMove = moveEvent => {
        const delta = moveEvent.clientX - startX;
        const left = Math.max(260, leftStart + delta);
        const right = Math.max(260, rightStart - delta);
        els.focusPane.style.gridTemplateColumns = `${left}px 8px ${right}px`;
      };

      const onUp = () => {
        els.focusResizer.classList.remove("dragging");
        els.focusResizer.removeEventListener("pointermove", onMove);
        els.focusResizer.removeEventListener("pointerup", onUp);
      };

      els.focusResizer.addEventListener("pointermove", onMove);
      els.focusResizer.addEventListener("pointerup", onUp);
    }

    function startHeightResize(event) {
      const startY = event.clientY;
      const rect = els.workspace.getBoundingClientRect();
      const startFinalHeight = document.querySelector(".final-pane").getBoundingClientRect().height;

      els.heightResizer.setPointerCapture(event.pointerId);
      els.heightResizer.classList.add("dragging");

      const onMove = moveEvent => {
        const delta = startY - moveEvent.clientY;
        const next = Math.min(Math.max(180, startFinalHeight + delta), rect.height - 220);
        document.documentElement.style.setProperty("--final-h", `${next}px`);
        document.documentElement.style.setProperty("--editor-h", `calc(100vh - var(--topbar-h) - var(--tabs-h) - var(--final-h) - 10px)`);
      };

      const onUp = () => {
        els.heightResizer.classList.remove("dragging");
        els.heightResizer.removeEventListener("pointermove", onMove);
        els.heightResizer.removeEventListener("pointerup", onUp);
      };

      els.heightResizer.addEventListener("pointermove", onMove);
      els.heightResizer.addEventListener("pointerup", onUp);
    }

    function scheduleSave() {
      if (state.applyingRemote || !state.supabase || !state.sessionKey) return;
      setStatus("saving", "저장중");
      clearTimeout(state.saveTimer);
      state.saveTimer = setTimeout(saveNow, SAVE_DELAY);
    }

    async function saveNow() {
      const payload = {
        session_key: state.sessionKey,
        updated_at: new Date().toISOString()
      };

      Object.entries(DOM_TO_DB).forEach(([domId, dbField]) => {
        payload[dbField] = textareas[domId].value;
      });
      payload[CARD_FIELDS.memo] = state.memoCards;
      payload[CARD_FIELDS.idea] = state.ideaCards;

      try {
        const { data, error } = await state.supabase
          .from("sessions")
          .upsert(payload, { onConflict: "session_key" })
          .select("id")
          .single();

        if (error) throw error;
        state.rowId = data.id;
        setStatus("saved", "저장됨");
      } catch (error) {
        console.error(error);
        setStatus("error", "오류");
        showToast("저장에 실패했습니다.");
      }
    }

    function updateCount() {
      const text = textareas.finalText.value;
      const mode = els.countMode.value;
      const count = countText(text, mode);
      els.countValue.textContent = count.toLocaleString("ko-KR");
      els.focusCountMode.value = mode;
      els.focusCountValue.textContent = count.toLocaleString("ko-KR");
      syncFocusFinalFromMain();
    }

    function countText(text, mode) {
      if (mode === "chars") return Array.from(text).length;
      if (mode === "charsNoSpace") return Array.from(text.replace(/\s/g, "")).length;
      return text.trim() ? text.trim().split(/\s+/).length : 0;
    }

    function updateSummaryCount() {
      const text = textareas.summaryText.value;
      els.summaryChars.textContent = `${countText(text, "chars").toLocaleString("ko-KR")}자`;
      els.summaryCharsNoSpace.textContent = `${countText(text, "charsNoSpace").toLocaleString("ko-KR")}자`;
      els.summaryWords.textContent = countText(text, "words").toLocaleString("ko-KR");
    }

    async function copySummaryText() {
      await navigator.clipboard.writeText(textareas.summaryText.value);
      showToast("정리 내용을 복사했습니다.");
    }

    async function copyShareUrl() {
      await navigator.clipboard.writeText(window.location.href);
      showToast("공유 URL을 복사했습니다.");
    }

    function applyInitialTheme() {
      const saved = localStorage.getItem(THEME_STORAGE_KEY);
      const prefersDark = window.matchMedia && window.matchMedia("(prefers-color-scheme: dark)").matches;
      document.documentElement.classList.toggle("dark", saved ? saved === "dark" : prefersDark);
    }

    function toggleTheme() {
      const isDark = document.documentElement.classList.toggle("dark");
      localStorage.setItem(THEME_STORAGE_KEY, isDark ? "dark" : "light");
    }

    function setStatus(type, text) {
      els.saveStatus.className = `status ${type}`;
      els.saveStatusText.textContent = text;
    }

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      clearTimeout(showToast.timer);
      showToast.timer = setTimeout(() => els.toast.classList.remove("show"), 2200);
    }

    function showConfigOverlay() {
      els.configOverlay.classList.add("show");
    }
  </script>
</body>
</html>
